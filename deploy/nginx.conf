# /etc/nginx/sites-available/taxbuddy-invoicing
server {
    listen 80;
    server_name invoicing.taxbuddyumair.com;   # apna (sub)domain
    return 301 https://$host$request_uri;
}
server {
    listen 443 ssl http2;
    server_name invoicing.taxbuddyumair.com;

    # certbot --nginx se ye do lines aa jayengi:
    # ssl_certificate     /etc/letsencrypt/live/.../fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/.../privkey.pem;

    client_max_body_size 5m;

    location /static/ {
        alias /srv/taxbuddy-invoicing/staticfiles/;
        expires 30d;
    }
    location / {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
