<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#0A2647; --navy-2:#0e3055; --green:#0D9E72; --green-d:#0a7f5c;
    --bg:#F4F7FB; --card:#fff; --line:#e4ebf3; --muted:#5b6b7f; --soft:#f0fdf4;
    --danger:#c0392b; --amber:#b8860b;
    --shadow:0 1px 3px rgba(10,38,71,.05),0 8px 24px rgba(10,38,71,.05);
  }
  body{margin:0;background:var(--bg)}
  .saas{display:grid;grid-template-columns:236px 1fr;min-height:100vh;
    font-family:'Inter',system-ui,sans-serif;color:var(--navy);font-size:14px}

  /* ---------- Sidebar ---------- */
  .sb{background:linear-gradient(180deg,var(--navy),#081d38);color:#c6d4e6;
    display:flex;flex-direction:column;position:sticky;top:0;height:100vh}
  .sb .brand{display:flex;align-items:center;gap:10px;padding:20px 18px 18px;
    border-bottom:1px solid rgba(255,255,255,.07)}
  .sb .brand .mark{width:34px;height:34px;border-radius:9px;flex-shrink:0;
    background:linear-gradient(135deg,var(--green),#12c98d);display:grid;place-items:center;
    color:#fff;font-weight:800;font-size:15px}
  .sb .brand b{color:#fff;font-size:15px;display:block;line-height:1.15}
  .sb .brand span{color:var(--green);font-size:11px;font-weight:600}
  .sb nav{padding:14px 10px;display:flex;flex-direction:column;gap:3px;flex:1}
  .sb .sec{font-size:10px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;
    color:#6d819c;padding:12px 10px 5px}
  .sb a{display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:9px;
    color:#b9c7da;text-decoration:none;font-weight:500;font-size:13.5px;transition:.15s}
  .sb a svg{width:17px;height:17px;flex-shrink:0;opacity:.85}
  .sb a:hover{background:rgba(255,255,255,.06);color:#fff}
  .sb a.on{background:var(--green);color:#fff;font-weight:600;box-shadow:0 4px 14px rgba(13,158,114,.35)}
  .sb .foot{padding:14px 16px;border-top:1px solid rgba(255,255,255,.07);font-size:11.5px;color:#7e91aa}
  .sb .foot .u{display:flex;align-items:center;gap:9px;margin-bottom:6px}
  .sb .foot .av{width:28px;height:28px;border-radius:50%;background:#1b3f6b;display:grid;
    place-items:center;color:#fff;font-weight:700;font-size:12px}
  .sb .foot b{color:#dbe6f2;font-size:12.5px;display:block}

  /* ---------- Main / topbar ---------- */
  .mainc{display:flex;flex-direction:column;min-width:0}
  .tb{background:#fff;border-bottom:1px solid var(--line);padding:14px 28px;
    display:flex;align-items:center;justify-content:space-between;gap:14px;
    position:sticky;top:0;z-index:30}
  .tb h1{font-size:17px;font-weight:700;margin:0}
  .tb .sub{color:var(--muted);font-size:12px;margin-top:1px}
  .tb .right{display:flex;align-items:center;gap:12px}
  .mode{display:flex;align-items:center;gap:7px;font-size:11.5px;font-weight:700;color:var(--amber);
    background:#fdf6e3;border:1px solid #f0e2b8;padding:5px 11px;border-radius:20px;white-space:nowrap}
  .mode .dot{width:7px;height:7px;border-radius:50%;background:var(--amber);animation:pulse 2s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
  .content{padding:26px 28px 60px;max-width:1150px;width:100%;box-sizing:border-box}

  /* ---------- Cards / tables / stats ---------- */
  .di-card{background:var(--card);border:1px solid var(--line);border-radius:14px;
    box-shadow:var(--shadow);margin-bottom:18px;overflow:hidden}
  .di-card h3{font-size:12.5px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;
    padding:15px 20px;border-bottom:1px solid var(--line);margin:0;color:var(--navy)}
  .list{width:100%;border-collapse:collapse;font-size:13px}
  .list th{text-align:left;font-size:10.5px;text-transform:uppercase;letter-spacing:.05em;
    color:var(--muted);font-weight:700;padding:11px 16px;border-bottom:1px solid var(--line);background:#fafcfe}
  .list td{padding:13px 16px;border-bottom:1px solid var(--line)}
  .list tr:last-child td{border-bottom:none}
  .list tr:hover td{background:#fafcfe}
  .fbrno{font-family:ui-monospace,monospace;font-size:12px;font-weight:600}
  .pill{display:inline-block;font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px}
  .pill.valid{background:var(--soft);color:var(--green-d)}
  .pill.failed{background:#fdeaea;color:var(--danger)}
  .num{text-align:right}
  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:20px}
  .stat{background:var(--card);border:1px solid var(--line);border-radius:14px;
    padding:18px;box-shadow:var(--shadow);display:flex;gap:14px;align-items:flex-start}
  .stat .ic{width:40px;height:40px;border-radius:10px;display:grid;place-items:center;flex-shrink:0}
  .stat .ic svg{width:20px;height:20px}
  .stat .lbl{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}
  .stat .val{font-size:22px;font-weight:800;margin-top:3px}
  .stat .val.g{color:var(--green-d)}
  .empty{text-align:center;padding:50px 20px;color:var(--muted)}
  .btn-g{display:inline-block;background:var(--green);color:#fff;padding:9px 16px;border-radius:9px;
    font-weight:600;font-size:13px;text-decoration:none;border:none;cursor:pointer;font-family:inherit}
  .btn-g:hover{background:var(--green-d)}

  .uchip{display:flex;align-items:center;gap:8px;background:#fff;border:1px solid var(--line);
    border-radius:22px;padding:5px 13px 5px 5px}
  .uchip .uav{width:26px;height:26px;border-radius:50%;background:var(--navy);color:#fff;
    display:grid;place-items:center;font-weight:700;font-size:12px}
  .uchip .unm{font-size:12.5px;font-weight:600;color:var(--navy);white-space:nowrap}
  @media(max-width:860px){.uchip .unm{display:none}}

  /* ---------- Mobile ---------- */
  .menu-btn{display:none;width:38px;height:38px;background:var(--navy);border:none;border-radius:9px;
    place-items:center;cursor:pointer;color:#fff}
  .menu-btn svg{width:19px;height:19px}
  @media(max-width:860px){
    .saas{grid-template-columns:1fr}
    .sb{position:fixed;left:-250px;width:236px;z-index:80;transition:.22s}
    .sb.open{left:0;box-shadow:0 0 60px rgba(0,0,0,.4)}
    .menu-btn{display:grid}
    .stats{grid-template-columns:1fr 1fr}
    .content{padding:18px 14px 50px}
    .tb{padding:12px 14px}
  }
</style>
