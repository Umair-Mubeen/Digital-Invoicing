<style>
  :root{--navy:#0A2647;--green:#0D9E72;--green-d:#0a7f5c;--bg:#F6F9FC;--line:#e4ebf3;
    --muted:#5b6b7f;--soft:#f0fdf4;--danger:#c0392b;
    --shadow:0 1px 3px rgba(10,38,71,.06),0 8px 24px rgba(10,38,71,.06)}
  .di-wrap{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--navy);
    padding:26px;max-width:1100px;margin:0 auto;font-size:14px}
  .di-top{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:20px;flex-wrap:wrap;gap:12px}
  .di-top h1{font-size:22px;font-weight:700;margin:0}
  .di-top p{color:var(--muted);font-size:13px;margin:3px 0 0}
  .di-nav{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap}
  .di-nav a{padding:8px 16px;border-radius:8px;text-decoration:none;font-weight:600;font-size:13px;
    color:var(--navy);background:#fff;border:1px solid var(--line)}
  .di-nav a.on{background:var(--green);color:#fff;border-color:var(--green)}
  .di-card{background:#fff;border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow);
    margin-bottom:18px;overflow:hidden}
  .di-card h3{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;
    padding:15px 20px;border-bottom:1px solid var(--line);margin:0}
  .list{width:100%;border-collapse:collapse;font-size:13px}
  .list th{text-align:left;font-size:11px;text-transform:uppercase;color:var(--muted);
    font-weight:600;padding:11px 16px;border-bottom:1px solid var(--line)}
  .list td{padding:13px 16px;border-bottom:1px solid var(--line)}
  .list tr:last-child td{border-bottom:none}
  .fbrno{font-family:ui-monospace,monospace;font-size:12px;font-weight:600}
  .pill{display:inline-block;font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px}
  .pill.valid{background:var(--soft);color:var(--green-d)}
  .pill.failed{background:#fdeaea;color:var(--danger)}
  .num{text-align:right}
  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:18px}
  .stat{background:#fff;border:1px solid var(--line);border-radius:12px;padding:16px 18px;box-shadow:var(--shadow)}
  .stat .lbl{font-size:11.5px;font-weight:600;color:var(--muted);text-transform:uppercase}
  .stat .val{font-size:24px;font-weight:800;margin-top:6px}
  .stat .val.g{color:var(--green-d)}
  .empty{text-align:center;padding:50px 20px;color:var(--muted)}
  .btn-g{display:inline-block;background:var(--green);color:#fff;padding:9px 16px;border-radius:9px;
    font-weight:600;font-size:13px;text-decoration:none}
  @media(max-width:820px){.stats{grid-template-columns:1fr 1fr}}
</style>
