<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{--navy:#0A2647;--green:#0D9E72;--green-d:#0a7f5c;--line:#e4ebf3;--muted:#5b6b7f;--danger:#c0392b}
  body{margin:0;background:linear-gradient(160deg,#0A2647 0%,#0e3055 55%,#0D9E72 160%);
    font-family:'Inter',system-ui,sans-serif;min-height:100vh;display:grid;place-items:center;padding:20px;box-sizing:border-box}
  .auth{background:#fff;border-radius:18px;box-shadow:0 24px 70px rgba(4,16,32,.45);
    width:100%;max-width:400px;padding:34px 32px;box-sizing:border-box}
  .auth .brand{display:flex;align-items:center;gap:11px;margin-bottom:22px}
  .auth .mark{width:40px;height:40px;border-radius:11px;background:linear-gradient(135deg,var(--green),#12c98d);
    display:grid;place-items:center;color:#fff;font-weight:800;font-size:16px}
  .auth .brand b{color:var(--navy);font-size:17px;display:block;line-height:1.1}
  .auth .brand span{color:var(--green-d);font-size:11.5px;font-weight:600}
  .auth h1{font-size:19px;color:var(--navy);margin:0 0 4px;font-weight:800}
  .auth .sub{color:var(--muted);font-size:13px;margin-bottom:20px}
  .f{display:flex;flex-direction:column;gap:5px;margin-bottom:13px}
  .f label{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}
  .f input{padding:11px 12px;border:1px solid var(--line);border-radius:9px;font:inherit;font-size:14px;background:#fcfdfe}
  .f input:focus{outline:none;border-color:var(--green);box-shadow:0 0 0 3px rgba(13,158,114,.12)}
  .err{background:#fdeaea;border:1px solid #f3c9c9;color:var(--danger);border-radius:9px;
    padding:10px 13px;font-size:12.5px;margin-bottom:13px;line-height:1.45}
  .bsub{width:100%;background:var(--green);color:#fff;border:none;border-radius:10px;padding:12px;
    font:inherit;font-weight:700;font-size:14.5px;cursor:pointer;margin-top:4px}
  .bsub:hover{background:var(--green-d)}
  .alt{text-align:center;font-size:13px;color:var(--muted);margin-top:16px}
  .alt a{color:var(--green-d);font-weight:700;text-decoration:none}
  .hint{font-size:11.5px;color:var(--muted);margin-top:3px;line-height:1.45}
</style>
<style>
  /* ===== Split login (v2) — signup ke purane .auth styles untouched ===== */
  body.split{display:block;padding:0;background:#fff}
  .lwrap{display:grid;grid-template-columns:1fr 1fr;min-height:100vh}
  .lbrand{background:linear-gradient(165deg,#0A2647 0%,#0e3055 60%,#0D9E72 175%);
    color:#fff;padding:56px 60px;display:flex;flex-direction:column;justify-content:space-between;
    position:relative;overflow:hidden}
  .lbrand::after{content:"";position:absolute;right:-120px;bottom:-120px;width:420px;height:420px;
    border-radius:50%;border:70px solid rgba(255,255,255,.045)}
  .lbrand .top{display:flex;align-items:center;gap:12px}
  .lbrand .mark{width:44px;height:44px;border-radius:12px;background:linear-gradient(135deg,#0D9E72,#12c98d);
    display:grid;place-items:center;font-weight:800;font-size:17px;box-shadow:0 10px 26px -8px rgba(13,158,114,.6)}
  .lbrand .top b{font-size:18px;display:block;line-height:1.1}
  .lbrand .top span{color:#57D9AC;font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase}
  .lbrand h2{font-size:30px;line-height:1.25;font-weight:800;margin:0 0 14px;max-width:420px;letter-spacing:-.01em}
  .lbrand .pts{display:flex;flex-direction:column;gap:14px;margin-top:26px}
  .lbrand .pt{display:flex;gap:12px;align-items:flex-start;color:#C9D8E9;font-size:14px;line-height:1.5;max-width:400px}
  .lbrand .pt .tick{width:22px;height:22px;border-radius:7px;background:rgba(13,158,114,.25);
    border:1px solid rgba(87,217,172,.45);color:#57D9AC;display:grid;place-items:center;
    font-size:12px;font-weight:800;flex-shrink:0;margin-top:1px}
  .lbrand .strip{display:flex;gap:26px;border-top:1px solid rgba(255,255,255,.12);padding-top:20px;flex-wrap:wrap}
  .lbrand .strip b{display:block;font-size:20px}
  .lbrand .strip span{color:#8FA6C2;font-size:11.5px;font-weight:600;letter-spacing:.03em}
  .lform{display:grid;place-items:center;padding:40px 24px;background:#F7FAFC}
  .lcard{width:100%;max-width:392px}
  .lcard h1{font-size:23px;color:var(--navy);margin:0 0 6px;font-weight:800;letter-spacing:-.01em}
  .lcard .sub{color:var(--muted);font-size:13.5px;margin-bottom:26px}
  .lcard .f input{padding:13px 14px;border-radius:11px;background:#fff;border:1.5px solid var(--line);
    transition:border-color .15s,box-shadow .15s}
  .lcard .f input:hover{border-color:#c8d6e5}
  .lcard .f input:focus{border-color:var(--green);box-shadow:0 0 0 4px rgba(13,158,114,.11)}
  .lcard input:-webkit-autofill{-webkit-box-shadow:0 0 0 40px #fff inset;box-shadow:0 0 0 40px #fff inset}
  .lcard .bsub{padding:13px;border-radius:11px;font-size:15px;box-shadow:0 10px 24px -8px rgba(13,158,114,.55);
    transition:transform .12s,box-shadow .12s}
  .lcard .bsub:hover{transform:translateY(-1px);box-shadow:0 14px 30px -8px rgba(13,158,114,.6)}
  .lcard .bsub:disabled{transform:none;cursor:default}
  @media (max-width:900px){
    .lwrap{grid-template-columns:1fr}
    .lbrand{padding:28px 26px;gap:20px}
    .lbrand h2{font-size:21px;margin-bottom:0}
    .lbrand .pts,.lbrand .strip,.lbrand::after{display:none}
  }
</style>
